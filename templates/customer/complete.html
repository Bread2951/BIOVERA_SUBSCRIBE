<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>구독 신청 완료</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
:root {
    --main-color: #1f6f8b;
    --main-dark: #15566d;
    --bg-color: #f3f8fa;
}

body {
    background: var(--bg-color);
    font-family: Arial, sans-serif;
}

.mobile-wrap {
    max-width: 430px;
    margin: 0 auto;
    background: white;
    min-height: 100vh;
    padding: 42px 22px;
    text-align: center;
}

.check-circle {
    width: 82px;
    height: 82px;
    border-radius: 50%;
    background: var(--main-color);
    color: white;
    font-size: 42px;
    line-height: 82px;
    margin: 40px auto 24px;
}

h1 {
    font-weight: 800;
    font-size: 25px;
    margin-bottom: 14px;
}

.desc {
    color: #666;
    line-height: 1.6;
    margin-bottom: 26px;
}

.info-box {
    background: #f3f8fa;
    border-radius: 18px;
    padding: 18px;
    text-align: left;
    margin-bottom: 26px;
    font-size: 14px;
    color: #555;
}

.btn-main {
    background: var(--main-color);
    color: white;
    border: 0;
    border-radius: 14px;
    padding: 15px;
    font-size: 16px;
    font-weight: 800;
}

.btn-main:hover {
    background: var(--main-dark);
    color: white;
}
</style>
</head>

<body>

<div class="mobile-wrap">

    <div class="check-circle">✓</div>

    <h1>구독 신청이 완료되었습니다</h1>

    <p class="desc">
        {{ name }}님, 신청해주셔서 감사합니다.<br>
        담당자가 확인 후 결제 및 배송 안내를 드립니다.
    </p>

    <div class="info-box">
        <strong>안내사항</strong><br><br>
        • 신청 내용은 관리자에게 자동 접수됩니다.<br>
        • 결제 안내 후 구독이 최종 확정됩니다.<br>
        • 배송일은 신청하신 시작일 기준으로 확인됩니다.
    </div>

    <a href="/subscribe" class="btn btn-main w-100">다시 신청하기</a>

</div>

</body>
</html>
