<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비오베라 구독 신청</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

<style>
:root {
    --main-color: #1f6f8b;
    --main-dark: #15566d;
    --bg-color: #f3f8fa;
}

body {
    background: var(--bg-color);
    font-family: Arial, sans-serif;
}

.mobile-wrap {
    max-width: 430px;
    margin: 0 auto;
    background: white;
    min-height: 100vh;
}

.hero {
    background: linear-gradient(160deg, #1f6f8b, #58b3cc);
    color: white;
    padding: 34px 22px 30px;
    border-bottom-left-radius: 30px;
    border-bottom-right-radius: 30px;
}

.badge-soft {
    background: rgba(255,255,255,.18);
    color: white;
    padding: 7px 12px;
    border-radius: 999px;
    font-size: 13px;
    display: inline-block;
    margin-bottom: 14px;
}

.hero h1 {
    font-size: 29px;
    font-weight: 900;
    line-height: 1.25;
    margin-bottom: 12px;
}

.hero p {
    opacity: .95;
    line-height: 1.55;
    margin-bottom: 0;
}

.price-card {
    margin: -18px 18px 20px;
    border: 0;
    border-radius: 20px;
    box-shadow: 0 12px 30px rgba(31,111,139,.16);
}

.price-box {
    border: 1px solid #e6eef1;
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
}

.price-title {
    font-weight: 800;
    font-size: 16px;
}

.price {
    font-size: 26px;
    font-weight: 900;
    color: var(--main-color);
}

.small-text {
    color: #777;
    font-size: 13px;
}

.section {
    padding: 0 18px 24px;
}

.benefit {
    background: #f3f8fa;
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
}

.form-card {
    border: 0;
    border-radius: 20px;
    box-shadow: 0 10px 26px rgba(31,111,139,.12);
}

label {
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 7px;
}

.form-control,
.form-select {
    padding: 14px;
    border-radius: 12px;
    font-size: 16px;
}

.btn-main {
    background: var(--main-color);
    color: white;
    border: 0;
    border-radius: 14px;
    padding: 16px;
    font-size: 17px;
    font-weight: 900;
}

.btn-main:hover {
    background: var(--main-dark);
    color: white;
}

.notice {
    font-size: 12px;
    color: #777;
    line-height: 1.5;
    text-align: center;
    margin-top: 14px;
}

.fixed-bottom-area {
    position: sticky;
    bottom: 0;
    background: white;
    padding: 12px 18px 18px;
    border-top: 1px solid #edf1f3;
}
</style>
</head>

<body>

<div class="mobile-wrap">

    <div class="hero">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="badge-soft mb-0">비오베라 정기구독</div>

        <a href="/mypage"
           class="btn btn-sm"
           style="background:rgba(255,255,255,.22); color:white; border-radius:999px; font-weight:700;">
            내 구독 조회
        </a>
    </div>

    <h1>매월 챙기는<br>비오베라 루틴</h1>
        <p>
            한 번 신청하면 매월 정해진 주기에 맞춰<br>
            비오베라를 간편하게 받아보실 수 있습니다.
        </p>
    </div>

    <div class="card price-card">
        <div class="card-body p-4">
            <h5 class="fw-bold mb-3">구독 상품 선택</h5>

            <div class="price-box">
                <div class="price-title">월 15병 1년 구독</div>
                <div class="price">648,000원</div>
                <div class="small-text">이틀에 한 병 정도로 가볍게 시작하는 구성</div>
            </div>

            <div class="price-box">
                <div class="price-title">월 30병 1년 구독</div>
                <div class="price">990,000원</div>
                <div class="small-text">매일 한 병 꾸준히 마시는 정기 루틴 구성</div>
            </div>
        </div>
    </div>

    <div class="section">
        <div class="card form-card">
            <div class="card-body p-4">
                <h4 class="fw-bold mb-2">구독 신청하기</h4>
                <p class="small-text mb-4">배송받으실 정보를 입력해주세요.</p>

                <form method="POST">

                    <div class="mb-3">
                        <label>이름</label>
                        <input type="text" name="name" class="form-control" placeholder="성함을 입력해주세요" required>
                    </div>

                    <div class="mb-3">
                        <label>연락처</label>
                        <input type="tel" name="phone" class="form-control" placeholder="숫자만 입력하세요" required>
                    </div>

                    <div class="mb-3">
    <label>배송지 주소</label>

    <div class="d-flex align-items-center gap-2 mb-2">
        <input type="text"
               id="postcode"
               class="form-control"
               style="max-width:110px;"
               placeholder="우편번호"
               readonly>

        <button type="button"
                class="btn btn-main"
                style="white-space:nowrap; padding:14px 18px;"
                onclick="searchAddress()">
            주소검색
        </button>
    </div>

    <input type="text"
           id="address"
           name="address"
           class="form-control mb-2"
           placeholder="주소검색을 눌러주세요"
           readonly
           required>

    <input type="text"
           id="detail_address"
           name="detail_address"
           class="form-control"
           placeholder="상세주소를 입력해주세요">

    <div class="small-text mt-2">
        ※ 공동현관 비밀번호 등은 배송 요청사항에 입력해주세요.
    </div>
</div>

                    <div class="mb-3">
                        <label>구독 상품</label>
                        <select name="plan" class="form-select" required>
                            <option value="500ml 30병 월구독">월 30병 1년 구독 / 990,000원</option>
                            <option value="500ml 15병 월구독">월 15병 1년 구독 / 648,000원</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label>희망 구독 시작일</label>
                        <input type="date" name="start_date" class="form-control" required>
                    </div>

                    <div class="mb-4">
                        <label>배송 요청사항</label>
                        <textarea name="memo" class="form-control" rows="3" placeholder="공동현관 비밀번호, 부재 시 요청사항 등을 입력해주세요"></textarea>
                    </div>

                    <button type="submit" class="btn btn-main w-100">
                        구독 신청 및 결제하기
                    </button>

                    <p class="notice">
                        현재 결제 화면은 테스트 단계이며,<br>
                        실제 운영 시 카드 정기결제로 연결됩니다.
                    </p>

                </form>
            </div>
        </div>
    </div>

</div>

<script>
function searchAddress() {
    new daum.Postcode({
        oncomplete: function(data) {
            document.getElementById("postcode").value = data.zonecode;
            document.getElementById("address").value = data.address;
            document.getElementById("detail_address").focus();
        }
    }).open();
}
</script>

</body>
</html>
