<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>배송 캘린더</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/static/admin_mobile.css">

<style>

:root{
    --main:#1f6f8b;
    --bg:#f3f8fa;
}

body{
    background:var(--bg);
}

.sidebar{
    width:240px;
    position:fixed;
    top:0;
    left:0;
    min-height:100vh;
    background:var(--main);
    color:white;
    padding:24px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:12px;
    border-radius:10px;
    margin-bottom:8px;
}

.sidebar a:hover,
.sidebar .active{
    background:rgba(255,255,255,.18);
}

.main{
    margin-left:240px;
    padding:28px;
}

.calendar{
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 8px 22px rgba(0,0,0,.08);
}

.calendar th{
    background:#e6f3f7;
    text-align:center;
    padding:15px;
}

.calendar td{

    width:14.28%;
    height:120px;

    border:1px solid #eee;

    vertical-align:top;

    padding:10px;
}

.day{

    font-weight:bold;

    margin-bottom:10px;

}

.shipping{

    display:inline-block;

    margin-top:6px;

    background:#1f6f8b;

    color:white;

    padding:4px 10px;

    border-radius:20px;

    font-size:13px;

}

.other{

    color:#bbb;

}

.today{

    background:#fff7d8;

}

.month-nav{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:20px;

}

</style>

</head>

<body>

<div class="sidebar">

<h3>BIOVERA</h3>

<a href="/admin">📊 대시보드</a>

<a href="/admin/customers">👥 고객관리</a>

<a href="/admin/shipments">🚚 배송관리</a>

<a href="/admin/payments">💳 결제관리</a>

<a href="/admin/calendar" class="active">🗓 배송캘린더</a>

</div>

<div class="main">

<div class="month-nav">

<a class="btn btn-outline-secondary"
href="/admin/calendar?year={{ prev_year }}&month={{ prev_month }}">

◀ 이전달

</a>

<h2>

{{ year }}년 {{ month }}월

</h2>

<a class="btn btn-outline-secondary"
href="/admin/calendar?year={{ next_year }}&month={{ next_month }}">

다음달 ▶

</a>

</div>

<div class="calendar">

<table class="table mb-0">

<thead>

<tr>

<th>월</th>
<th>화</th>
<th>수</th>
<th>목</th>
<th>금</th>
<th>토</th>
<th>일</th>

</tr>

</thead>

<tbody>

{% for week in weeks %}

<tr>

{% for d in week %}

{% set ds = d.strftime("%Y-%m-%d") %}

<td

{% if ds == today %}

class="today"

{% endif %}

>

<div class="day {% if d.month != month %}other{% endif %}">

{{ d.day }}

</div>

{% if ds in shipping_counts %}

<a href="/admin/calendar/{{ ds }}" class="shipping" style="text-decoration:none;">

🚚 {{ shipping_counts[ds] }}건

</a>

{% endif %}

</td>

{% endfor %}

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</body>

</html>
